# Render Infrastructure as Code — SkillChef
# https://render.com/docs/infrastructure-as-code
#
# Deploy order: skillchef-db → skillchef-redis → skillchef-api → skillchef-client
#
# Env vars marked sync: false must be set manually in the Render dashboard
# before the first deploy. See .env.example in each service directory.
#
# Environment management:
#   dev     → run locally with .env files (see server/.env.example, client/.env.example)
#   staging → duplicate these services with name suffix "-staging" in a separate Render project
#   prod    → this file (SPRING_PROFILES_ACTIVE / NODE_ENV controls behaviour)

services:
  # ---------------------------------------------------------------------------
  # Spring Boot API (Docker runtime — Java is not natively supported on Render)
  # ---------------------------------------------------------------------------
  - type: web
    name: skillchef-api
    runtime: docker
    plan: free
    rootDir: server
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health

    envVars:
      # ── Database ────────────────────────────────────────────────────────────
      # Format: jdbc:postgresql://<host>:<port>/<db>
      # Get from: Render dashboard → skillchef-db → Connect → Internal URL
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false

      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ── Auth / JWT ──────────────────────────────────────────────────────────
      # generateValue: Render creates a cryptographically strong secret automatically.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: skillchef
      - key: JWT_ACCESS_TTL
        value: PT15M
      - key: REFRESH_TTL
        value: P30D

      # ── CORS ────────────────────────────────────────────────────────────────
      # Set to the deployed frontend URL, e.g. https://skillchef-client.onrender.com
      - key: APP_BASE_URL
        sync: false

      # ── Storage (Cloudflare R2 recommended; also compatible with AWS S3) ────
      # R2 endpoint:  https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      # S3 endpoint:  leave blank
      - key: STORAGE_ENDPOINT
        sync: false
      # R2 region: "auto"  |  S3 region: e.g. "us-east-1"
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: skillchef-media
      # Public CDN base URL for uploaded files, e.g. https://pub-xxx.r2.dev
      - key: STORAGE_CDN_BASE_URL
        sync: false
      - key: STORAGE_MAX_FILE_SIZE_MB
        value: "20"

      # ── Sentry error tracking ────────────────────────────────────────────────
      # Get DSN: sentry.io → Project Settings → Client Keys
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production

      # ── Notifications / SendGrid ─────────────────────────────────────────────
      # Leave blank to disable email notifications.
      # Get key: app.sendgrid.com → Settings → API Keys
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: SkillChef

      # ── Logtail / Better Stack ───────────────────────────────────────────────
      # Preferred alternative: configure a Log Drain in the Render dashboard
      # (Dashboard → your service → Logs → Add Drain) — no token needed in the app.
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

  # ---------------------------------------------------------------------------
  # Next.js Frontend (Node.js runtime)
  # ---------------------------------------------------------------------------
  - type: web
    name: skillchef-client
    runtime: node
    nodeVersion: "20"
    plan: free
    rootDir: client
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /

    envVars:
      # ── Backend API ──────────────────────────────────────────────────────────
      # Set to: https://skillchef-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false

      # ── Sentry (frontend) ────────────────────────────────────────────────────
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      # Auth token is used only at build time to upload source maps.
      # Get: sentry.io → Org Settings → Auth Tokens
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      # Sentry org slug and project name visible in your sentry.io project URL.
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false

      # ── PostHog analytics ────────────────────────────────────────────────────
      # Get key: app.posthog.com → Project Settings → API Keys
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      # US cloud: https://us.posthog.com  |  EU cloud: https://eu.posthog.com
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.posthog.com

      # ── Logtail / Better Stack (server-side Next.js logs) ────────────────────
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

  # ---------------------------------------------------------------------------
  # Background Worker
  # Uncomment when the worker/ directory is scaffolded (Person 3 — BullMQ jobs).
  # ---------------------------------------------------------------------------
  # - type: worker
  #   name: skillchef-worker
  #   runtime: node
  #   nodeVersion: "20"
  #   plan: free
  #   rootDir: worker
  #   branch: main
  #   autoDeploy: true
  #   buildCommand: pnpm install --frozen-lockfile
  #   startCommand: pnpm start
  #   envVars:
  #     - key: REDIS_URL
  #       fromService:
  #         type: redis
  #         name: skillchef-redis
  #         property: connectionString
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: SENTRY_DSN
  #       sync: false
  #     - key: LOGTAIL_SOURCE_TOKEN
  #       sync: false

  # ---------------------------------------------------------------------------
  # Redis — session cache (API) and job queue (Worker)
  # ---------------------------------------------------------------------------
  - type: redis
    name: skillchef-redis
    plan: free
    ipAllowList: []     # empty = only internal Render services can connect

databases:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary data store
  # ---------------------------------------------------------------------------
  - name: skillchef-db
    plan: free
    databaseName: skillchef
    user: skillchef
