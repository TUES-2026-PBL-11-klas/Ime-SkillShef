# Render Infrastructure as Code — SkillChef
# https://render.com/docs/infrastructure-as-code
#
# Deploy order: skillchef-db → skillchef-redis → skillchef-api → skillchef-client
#
# Env vars marked sync: false must be set manually in the Render dashboard
# before the first deploy. See .env.example in each service directory.
#
# Environment management:
#   dev     → run locally with .env files (see server/.env.example, client/.env.example)
#   staging → duplicate these services with name suffix "-staging" in a separate Render project
#   prod    → this file (SPRING_PROFILES_ACTIVE / NODE_ENV controls behavior)

services:
  # ---------------------------------------------------------------------------
  # Spring Boot API
  # ---------------------------------------------------------------------------
  - type: web
    name: skillchef-api
    runtime: docker
    plan: free
    rootDir: server
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      # Database — set to: jdbc:postgresql://<host>:<port>/<db>
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Runtime profile
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # JWT — generateValue creates a strong random secret on first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: skillchef
      # Set to the frontend URL, e.g. https://skillchef-client.onrender.com
      - key: APP_BASE_URL
        sync: false
      # Storage (Cloudflare R2 / AWS S3)
      - key: STORAGE_ENDPOINT
        sync: false  # e.g. https://<account-id>.r2.cloudflarestorage.com
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: skillchef-media
      - key: STORAGE_CDN_BASE_URL
        sync: false  # e.g. https://media.skillchef.com
      - key: STORAGE_MAX_FILE_SIZE_MB
        value: "20"
      # Sentry — obtain DSN from https://sentry.io → Project Settings → Client Keys
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      # Logtail — obtain token from https://betterstack.com → Sources → your source
      # Note: on Render, you can also configure a Log Drain (Dashboard → Logs → Drain)
      # to ship container stdout automatically without embedding the token in the app.
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  - type: web
    name: skillchef-client
    runtime: node
    plan: free
    rootDir: client
    branch: main
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      # API base URL — set to: https://skillchef-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Sentry (frontend)
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      # PostHog — obtain key from https://app.posthog.com → Project Settings → API keys
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.posthog.com
      # Sentry org/project for source map uploads (not secrets, but project-specific)
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      # Logtail — Next.js server-side log shipping
      - key: LOGTAIL_SOURCE_TOKEN
        sync: false

  # ---------------------------------------------------------------------------
  # Background Worker  (uncomment when worker/ directory is scaffolded — Issue #3 / Person 3)
  # ---------------------------------------------------------------------------
  # - type: worker
  #   name: skillchef-worker
  #   runtime: node
  #   plan: free
  #   rootDir: worker
  #   branch: main
  #   autoDeploy: true
  #   buildCommand: pnpm install --frozen-lockfile
  #   startCommand: pnpm start
  #   envVars:
  #     - key: REDIS_URL
  #       fromService:
  #         type: redis
  #         name: skillchef-redis
  #         property: connectionString
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: SENTRY_DSN
  #       sync: false
  #     - key: LOGTAIL_SOURCE_TOKEN
  #       sync: false

  # ---------------------------------------------------------------------------
  # Redis — shared by API (session cache) and Worker (BullMQ queues)
  # ---------------------------------------------------------------------------
  - type: redis
    name: skillchef-redis
    plan: free
    ipAllowList: []

databases:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  - name: skillchef-db
    plan: free
    databaseName: skillchef
    user: skillchef
