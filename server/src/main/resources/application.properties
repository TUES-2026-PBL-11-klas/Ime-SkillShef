spring.application.name=skillchef-server
server.port=${SERVER_PORT:8080}

# --- PostgreSQL datasource (configured via environment variables) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is managed separately (Flyway migrations), so Hibernate must not touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- Auth / JWT ---
# Base64-encoded HMAC secret (>= 256 bits). Override in every environment.
skillchef.auth.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kLWVudmlyb25tZW50LXBsZWFzZQ==}
skillchef.auth.jwt.issuer=${JWT_ISSUER:skillchef}
# Access token lifetime (stateless JWT), default 15 minutes.
skillchef.auth.jwt.access-token-ttl=${JWT_ACCESS_TTL:PT15M}
# Refresh token lifetime (opaque, stored hashed), default 30 days.
skillchef.auth.refresh-token-ttl=${REFRESH_TTL:P30D}
# Public base URL of the web app, used for the CORS allowed origin.
skillchef.auth.app-base-url=${APP_BASE_URL:http://localhost:3000}
