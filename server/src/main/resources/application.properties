spring.application.name=skillchef-server
server.port=${SERVER_PORT:8080}

# --- PostgreSQL datasource (configured via environment variables) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# Schema is managed separately (Flyway migrations), so Hibernate must not touch it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- Auth / JWT ---
# Base64-encoded HMAC secret (>= 256 bits). Override in every environment.
skillchef.auth.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kLWVudmlyb25tZW50LXBsZWFzZQ==}
skillchef.auth.jwt.issuer=${JWT_ISSUER:skillchef}
# Access token lifetime (stateless JWT), default 15 minutes.
skillchef.auth.jwt.access-token-ttl=${JWT_ACCESS_TTL:PT15M}
# Refresh token lifetime (opaque, stored hashed), default 30 days.
skillchef.auth.refresh-token-ttl=${REFRESH_TTL:P30D}
# Public base URL of the web app, used for the CORS allowed origin.
skillchef.auth.app-base-url=${APP_BASE_URL:http://localhost:3000}

# --- File storage (avatars, etc.) ---
# Local-filesystem implementation until Person 4's cloud storage SDK is wired in.
skillchef.storage.local-dir=${STORAGE_LOCAL_DIR:uploads}
skillchef.storage.public-base-url=${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/uploads}
skillchef.storage.max-file-size=${STORAGE_MAX_FILE_SIZE:5242880}
# Multipart limits (keep in sync with skillchef.storage.max-file-size).
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Actuator (health-check endpoint exposed for Render) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# --- Sentry error tracking ---
# Set SENTRY_DSN to enable. Leave blank to disable.
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.2
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# --- Redis cache ---
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# --- Logging ---
# JSON output is handled by logback-spring.xml (uses logstash-logback-encoder).
# On Render, configure a Log Drain (Dashboard → Logs → Drain) to forward stdout to Logtail.

# --- AI Chef Assistant (provider-agnostic chat client; Gemini by default) ---
# Transport only: recipe prompts / conversation persistence live in the AI service
# layer built on top of this client.
skillchef.ai.provider=${AI_PROVIDER:gemini}
skillchef.ai.api-key=${AI_API_KEY:}
skillchef.ai.model=${AI_MODEL:gemini-2.5-flash}
skillchef.ai.base-url=${AI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
# Client-side cap to stay under the provider quota (Gemini free tier ~15 RPM).
skillchef.ai.requests-per-minute=${AI_REQUESTS_PER_MINUTE:15}
# Retries after the first attempt for transient failures (429 / 5xx / timeout).
skillchef.ai.max-retries=${AI_MAX_RETRIES:3}
skillchef.ai.retry-backoff=${AI_RETRY_BACKOFF:PT0.5S}
skillchef.ai.max-retry-backoff=${AI_MAX_RETRY_BACKOFF:PT8S}
skillchef.ai.connect-timeout=${AI_CONNECT_TIMEOUT:PT5S}
skillchef.ai.read-timeout=${AI_READ_TIMEOUT:PT30S}
skillchef.ai.temperature=${AI_TEMPERATURE:0.7}
skillchef.ai.max-output-tokens=${AI_MAX_OUTPUT_TOKENS:1024}
